{% extends "base.html" %}
{% load static %}

{% block title %}{{ title|default:"Account" }} - {{ block.super }}{% endblock %}

{% block extra_css %}
<style>
:root {
    --primary-color: #667eea;
    --primary-dark: #764ba2;
    --accent-color: #f093fb;
    --success-color: #38a169;
    --success-light: #c6f6d5;
    --warning-color: #d69e2e;
    --danger-color: #e53e3e;
    --info-color: #3182ce;
    --text-primary: #2d3748;
    --text-secondary: #718096;
    --text-muted: #a0aec0;
    --border-color: #e2e8f0;
    --shadow-light: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-medium: 0 10px 25px -3px rgba(0, 0, 0, 0.1);
    --shadow-heavy: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
    --border-radius: 12px;
    --border-radius-sm: 8px;
    --border-radius-lg: 16px;
    --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --gradient-primary: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
    --gradient-success: linear-gradient(135deg, var(--success-color) 0%, #48bb78 100%);
    --gradient-accent: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
}

/* Global auth container styles */
.auth-container {
    min-height: 100vh;
    position: relative;
    overflow: hidden;
}

.auth-container.primary {
    background: var(--gradient-primary);
}

.auth-container.success {
    background: var(--gradient-success);
}

.auth-bg {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: 
        radial-gradient(circle at 20% 50%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(120, 200, 255, 0.3) 0%, transparent 50%);
    animation: float 6s ease-in-out infinite;
}

@keyframes float {
    0%, 100% { transform: translateY(0px) translateX(0px); }
    50% { transform: translateY(-10px) translateX(10px); }
}

.auth-container.success .auth-bg {
    background: 
        radial-gradient(circle at 20% 50%, rgba(56, 161, 105, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(72, 187, 120, 0.3) 0%, transparent 50%),
        radial-gradient(circle at 40% 80%, rgba(56, 178, 172, 0.3) 0%, transparent 50%);
}

/* Auth card styles */
.auth-card {
    border: none;
    border-radius: var(--border-radius);
    backdrop-filter: blur(20px);
    background: rgba(255, 255, 255, 0.95);
    box-shadow: var(--shadow-heavy);
    animation: slideInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    overflow: hidden;
    position: relative;
    margin: 2rem 0;
}

.auth-card.success {
    background: rgba(255, 255, 255, 0.98);
}

@keyframes slideInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.auth-card::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: var(--gradient-primary);
}

.auth-card.success::before {
    background: var(--gradient-success);
}

/* Logo styles */
.auth-logo img {
    filter: drop-shadow(0 2px 8px rgba(102, 126, 234, 0.2));
    transition: var(--transition);
}

.auth-logo img:hover {
    transform: scale(1.05);
}

/* Icon styles */
.auth-icon {
    animation: pulse 2s ease-in-out infinite;
}

.auth-icon.success {
    animation: bounceIn 1s ease-out;
}

@keyframes pulse {
    0%, 100% { 
        transform: scale(1);
        opacity: 1;
    }
    50% { 
        transform: scale(1.05);
        opacity: 0.8;
    }
}

@keyframes bounceIn {
    0% { 
        transform: scale(0.3);
        opacity: 0;
    }
    50% { 
        transform: scale(1.05);
        opacity: 0.8;
    }
    70% { 
        transform: scale(0.9);
        opacity: 0.9;
    }
    100% { 
        transform: scale(1);
        opacity: 1;
    }
}

/* Form styles */
.auth-form .form-control {
    border: 1px solid var(--border-color);
    border-radius: var(--border-radius-sm);
    padding: 12px 16px;
    font-size: 0.9rem;
    transition: var(--transition);
    background: rgba(255, 255, 255, 0.9);
}

.auth-form .form-control:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    transform: translateY(-1px);
    background: white;
}

.auth-form .form-control.valid {
    border-color: var(--success-color);
}

.auth-form .form-control.invalid {
    border-color: var(--danger-color);
}

.auth-form .form-label {
    color: var(--text-primary);
    margin-bottom: 8px;
    font-weight: 500;
}

/* Button styles */
.auth-btn {
    border: none;
    border-radius: var(--border-radius-sm);
    padding: 12px 20px;
    font-weight: 500;
    background: var(--gradient-primary);
    transition: var(--transition);
    position: relative;
    overflow: hidden;
    color: white;
}

.auth-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transition: left 0.5s;
}

.auth-btn:hover::before {
    left: 100%;
}

.auth-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-medium);
    background: var(--gradient-accent);
    color: white;
}

.auth-btn.loading {
    pointer-events: none;
    opacity: 0.8;
}

.auth-btn.loading i {
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

.btn-outline-primary {
    background: transparent;
    border-color: var(--primary-color);
    color: var(--primary-color);
}

.btn-outline-primary:hover {
    background: var(--primary-color);
    color: white;
    transform: translateY(-1px);
    box-shadow: var(--shadow-light);
}

/* Alert styles */
.auth-alert {
    border: none;
    border-radius: var(--border-radius-sm);
    font-size: 0.85rem;
    padding: 12px 16px;
}

.auth-alert.alert-danger {
    background: linear-gradient(135deg, #fed7d7 0%, #feb2b2 100%);
    color: #c53030;
}

.auth-alert.alert-success {
    background: linear-gradient(135deg, #c6f6d5 0%, #9ae6b4 100%);
    color: #22543d;
}

.auth-alert.alert-info {
    background: linear-gradient(135deg, #bee3f8 0%, #90cdf4 100%);
    color: #2a4365;
}

/* Divider styles */
.auth-divider {
    position: relative;
    text-align: center;
    margin: 24px 0;
}

.auth-divider::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--border-color), transparent);
}

.divider-text {
    background: rgba(255, 255, 255, 0.95);
    padding: 0 16px;
    color: var(--text-secondary);
    font-size: 0.8rem;
}

/* Info box styles */
.info-box {
    border-radius: var(--border-radius-sm);
    padding: 16px;
    text-align: left;
}

.info-box.primary {
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
    border: 1px solid rgba(102, 126, 234, 0.2);
}

.info-box.success {
    background: linear-gradient(135deg, rgba(56, 161, 105, 0.1) 0%, rgba(72, 187, 120, 0.1) 100%);
    border: 1px solid rgba(56, 161, 105, 0.2);
}

.info-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.info-header {
    color: var(--text-primary);
    font-size: 0.9rem;
    display: flex;
    align-items: center;
}

.info-email {
    color: var(--primary-color);
    font-size: 1rem;
    word-break: break-word;
    background: white;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    font-family: 'Courier New', monospace;
    transition: var(--transition);
}

.info-email.success {
    color: var(--success-color);
}

/* Password toggle button */
.toggle-password {
    border: none !important;
    background: none !important;
    font-size: 0.85rem;
    color: var(--text-secondary) !important;
    transition: var(--transition);
}

.toggle-password:hover {
    color: var(--primary-color) !important;
}

/* Text styles */
.text-decoration-none {
    color: var(--primary-color);
    transition: var(--transition);
    text-decoration: none !important;
}

.text-decoration-none:hover {
    color: var(--primary-dark);
    text-decoration: underline !important;
}

/* Form text styles */
.form-text {
    color: var(--text-secondary);
    font-size: 0.75rem;
    margin-top: 4px;
}

/* Checkbox styles */
.form-check-input {
    border-radius: 4px;
    border: 1px solid var(--border-color);
}

.form-check-input:checked {
    background-color: var(--primary-color);
    border-color: var(--primary-color);
}

.form-check-input:focus {
    border-color: var(--primary-color);
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

/* Mobile optimizations */
@media (max-width: 576px) {
    .auth-card {
        margin: 16px;
        border-radius: var(--border-radius-sm);
    }
    
    .auth-form .form-control {
        padding: 10px 14px;
        font-size: 0.85rem;
    }
    
    .auth-btn {
        padding: 10px 16px;
        font-size: 0.9rem;
    }
    
    .auth-container {
        padding: 0;
    }
    
    .info-box {
        padding: 12px;
    }
    
    .info-email {
        font-size: 0.9rem;
    }
}

@media (max-width: 768px) {
    .auth-container {
        overflow-y: auto;
        min-height: auto;
    }
    
    .auth-card {
        margin: 1rem;
    }
}

/* Enhanced focus states for accessibility */
.auth-form .form-control:focus,
.auth-btn:focus,
.form-check-input:focus {
    outline: none;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
}

/* Loading states */
.form-control.loading {
    opacity: 0.7;
    pointer-events: none;
}

/* Animation utilities */
.fade-in {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.fade-in.visible {
    opacity: 1;
    transform: translateY(0);
}

/* Special effects */
.sparkle::before {
    content: '✨';
    position: absolute;
    top: 10%;
    right: 20%;
    font-size: 1.5rem;
    animation: sparkle 2s ease-in-out infinite;
    opacity: 0;
}

.sparkle::after {
    content: '⭐';
    position: absolute;
    bottom: 20%;
    left: 15%;
    font-size: 1.2rem;
    animation: sparkle 2s ease-in-out 0.5s infinite;
    opacity: 0;
}

@keyframes sparkle {
    0%, 100% { 
        opacity: 0;
        transform: scale(0.5);
    }
    50% { 
        opacity: 1;
        transform: scale(1);
    }
}
</style>
{% endblock %}

{% block extra_js %}
<script>
// Common auth functionality
document.addEventListener('DOMContentLoaded', function() {
    // Password toggle functionality
    const togglePasswordBtns = document.querySelectorAll('.toggle-password');
    togglePasswordBtns.forEach(btn => {
        btn.addEventListener('click', function() {
            const input = this.parentElement.querySelector('input');
            const icon = this.querySelector('i');
            
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        });
    });
    
    // Enhanced form validation
    const forms = document.querySelectorAll('.needs-validation');
    forms.forEach(form => {
        form.addEventListener('submit', function(event) {
            if (!this.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            } else {
                // Add loading state
                const submitBtn = this.querySelector('button[type="submit"]');
                if (submitBtn) {
                    submitBtn.classList.add('loading');
                    submitBtn.disabled = true;
                }
            }
            this.classList.add('was-validated');
        });
    });
    
    // Real-time validation feedback
    const formControls = document.querySelectorAll('.form-control');
    formControls.forEach(control => {
        control.addEventListener('blur', function() {
            if (this.checkValidity()) {
                this.classList.add('valid');
                this.classList.remove('invalid');
            } else if (this.value.length > 0) {
                this.classList.add('invalid');
                this.classList.remove('valid');
            } else {
                this.classList.remove('valid', 'invalid');
            }
        });
        
        control.addEventListener('focus', function() {
            this.classList.remove('valid', 'invalid');
        });
    });
    
    // Fade-in animations
    const fadeElements = document.querySelectorAll('.fade-in');
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    });
    
    fadeElements.forEach(el => observer.observe(el));
    
    // Click to copy functionality
    const copyElements = document.querySelectorAll('[data-copy]');
    copyElements.forEach(el => {
        el.style.cursor = 'pointer';
        el.title = 'Click to copy';
        
        el.addEventListener('click', function() {
            navigator.clipboard.writeText(this.textContent).then(() => {
                showNotification('Copied to clipboard!', 'success');
            }).catch(() => {
                showNotification('Failed to copy', 'danger');
            });
        });
    });
    
    // Notification system
    window.showNotification = function(message, type = 'info') {
        const notification = document.createElement('div');
        notification.className = `auth-alert alert-${type} position-fixed fade-in`;
        notification.style.cssText = `
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 350px;
            box-shadow: var(--shadow-medium);
        `;
        notification.innerHTML = `
            <div class="d-flex align-items-center">
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'danger' ? 'exclamation-circle' : 'info-circle'} me-2"></i>
                <div>${message}</div>
                <button type="button" class="btn-close ms-auto" data-bs-dismiss="alert"></button>
            </div>
        `;
        
        document.body.appendChild(notification);
        notification.classList.add('visible');
        
        // Auto-remove after 4 seconds
        setTimeout(() => {
            notification.classList.remove('visible');
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.remove();
                }
            }, 300);
        }, 4000);
    };
    
    // Button loading state management
    window.setButtonLoading = function(button, loading, text = null) {
        if (loading) {
            button.classList.add('loading');
            button.disabled = true;
            const originalText = button.innerHTML;
            button.dataset.originalText = originalText;
            button.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Loading...';
        } else {
            button.classList.remove('loading');
            button.disabled = false;
            if (text) {
                button.innerHTML = text;
            } else if (button.dataset.originalText) {
                button.innerHTML = button.dataset.originalText;
            }
        }
    };
});
</script>
{% endblock %}
